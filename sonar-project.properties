# SonarQube / SonarScanner configuration for the Code Quality stage.
sonar.projectKey=taskflow-api
sonar.projectName=TaskFlow API
sonar.projectVersion=1.0

# Source & test layout
sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Import Jest coverage (lcov) produced by `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep third-party and generated code out of the analysis.
sonar.exclusions=node_modules/**,coverage/**,reports/**,prometheus/**

# The scanner reads sonar.host.url and sonar.token from Jenkins-injected env vars
# (SONAR_HOST_URL / SONAR_TOKEN) so no secrets are committed here.
