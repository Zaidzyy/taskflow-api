# Staging environment used by the Jenkins "Deploy" stage.
# Brings up the API together with a Prometheus instance that scrapes it,
# giving us a working end-to-end monitoring setup on one command.
services:
  taskflow-api:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-staging}
    image: taskflow-api:${IMAGE_TAG:-staging}
    container_name: taskflow-api
    environment:
      - NODE_ENV=production
      - PORT=3000
      # In real use this comes from Jenkins credentials, not a literal value.
      - API_KEY=${API_KEY:-staging-placeholder-key}
      - APP_VERSION=${APP_VERSION:-staging}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - taskflow-net

  prometheus:
    # Config + alert rules are baked into a small custom image (see
    # prometheus/Dockerfile) rather than bind-mounted. This is required for the
    # Jenkins Deploy stage — where `docker compose` runs inside the Jenkins
    # container but the daemon runs on the host — because a build context is
    # streamed to the daemon while a bind mount is (wrongly) resolved against the
    # host filesystem. No bind mounts here, so nothing to mis-resolve.
    build:
      context: ./prometheus
    image: taskflow-prometheus:${IMAGE_TAG:-staging}
    container_name: taskflow-prometheus
    depends_on:
      - taskflow-api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - taskflow-net

networks:
  taskflow-net:
    driver: bridge
